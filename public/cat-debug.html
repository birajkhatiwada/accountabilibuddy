<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cat Sprite Debug</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #18181b; color: #e4e4e7; font-family: monospace; padding: 24px; }
  h1 { font-size: 15px; color: #a1a1aa; margin-bottom: 24px; }
  .section { margin-bottom: 32px; }
  .section-title {
    font-size: 11px; font-weight: bold; letter-spacing: .12em;
    color: #71717a; text-transform: uppercase; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid #27272a;
  }
  .anims { display: flex; flex-wrap: wrap; gap: 16px; }
  .anim { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .anim-preview {
    position: relative;
    width: 96px; height: 96px;
    outline: 1px solid #3f3f46;
    background: #09090b;
    cursor: pointer;
  }
  .anim-preview .sprite {
    position: absolute; top: 0; left: 0;
    width: 96px; height: 96px;
    image-rendering: pixelated;
    background-image: url('/cat-sprite.png');
    background-repeat: no-repeat;
    /* source is 32×32 shown at 96×96 = 3× */
    background-size: 1056px 5088px; /* 352×3 = 1056, 1696×3 = 5088 */
  }
  .anim-strip { display: flex; gap: 2px; }
  .anim-strip .frame {
    flex-shrink: 0;
    width: 48px; height: 48px;
    image-rendering: pixelated;
    background-image: url('/cat-sprite.png');
    background-repeat: no-repeat;
    /* 352×2 = 704, 1696×2 = 3392 */
    background-size: 704px 3392px;
    outline: 1px solid #27272a;
  }
  .anim-name { font-size: 9px; color: #71717a; text-align: center; }
  .anim-coords { font-size: 8px; color: #3f3f46; }
  .anim-preview.playing { outline-color: #10b981; }
  .playing-badge {
    position: absolute; top: 2px; right: 2px;
    width: 6px; height: 6px; background: #10b981; border-radius: 50%;
    display: none;
  }
  .anim-preview.playing .playing-badge { display: block; }
  .controls { margin-bottom: 20px; font-size: 11px; color: #71717a; }
  .cat-select { display: flex; gap: 8px; margin-bottom: 20px; }
  .cat-btn {
    padding: 4px 10px; border-radius: 6px; border: 1px solid #3f3f46;
    background: #27272a; color: #a1a1aa; font-family: monospace;
    font-size: 11px; cursor: pointer;
  }
  .cat-btn.active { border-color: #10b981; color: #10b981; background: #052e16; }
  .fps-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .fps-row label { font-size: 11px; color: #71717a; }
  .fps-row input { width: 60px; }
</style>
</head>
<body>
<h1>Cat Sprite — All Animations</h1>

<div class="cat-select">
  <button class="cat-btn active" data-cat="cat-sprite.png">Orange</button>
  <button class="cat-btn" data-cat="cat-sprite-dark.png">Dark</button>
  <button class="cat-btn" data-cat="cat-sprite-white.png">White</button>
</div>

<div class="fps-row">
  <label>Frame speed (ms):</label>
  <input type="range" id="fps" min="50" max="600" value="150" step="25">
  <span id="fps-val">150ms</span>
</div>

<div class="controls">Click any animation to preview it playing. Source: 32×32 px per frame.</div>

<div id="sections"></div>

<script>
// All animations: [name, sourceY, frameCount]
const SECTIONS = [
  { title: 'REST', anims: [
    ['rest 1',   0,   6],
    ['rest 2',   32,  8],
    ['rest 3',   64,  6],
    ['rest 4',   96,  10],
  ]},
  { title: 'WALK', anims: [
    ['walk down',     128, 4],
    ['walk up',       160, 4],
    ['walk right',    192, 8],
    ['walk left',     224, 8],
    ['walk left-d',   256, 6],
    ['walk right-d',  288, 6],
    ['walk right-up', 320, 6],
    ['walk left-up',  352, 6],
  ]},
  { title: 'SLEEP', anims: [
    ['sleep1 L', 384, 2],
    ['sleep1 R', 416, 2],
    ['sleep2 L', 448, 2],
    ['sleep2 R', 480, 2],
    ['sleep3 L', 512, 2],
    ['sleep3 R', 544, 2],
    ['sleep4 L', 576, 2],
    ['sleep4 R', 608, 2],
  ]},
  { title: 'MEOW', anims: [
    ['meow sit',   896,  3],
    ['meow stand', 928,  3],
    ['meow sit 2', 960,  3],
    ['meow lie',   992,  3],
  ]},
  { title: 'YAWN', anims: [
    ['yawn sit',   1024, 8],
    ['yawn stand', 1056, 8],
    ['yawn sit 2', 1088, 8],
    ['yawn lie',   1120, 8],
  ]},
  { title: 'WASH', anims: [
    ['wash sit',   1152, 9],
    ['wash stand', 1184, 9],
    ['wash lie',   1216, 7],
  ]},
  { title: 'SCRATCH', anims: [
    ['scratch L', 1248, 11],
    ['scratch R', 1280, 11],
  ]},
  { title: 'HISS', anims: [
    ['hiss L', 1312, 2],
    ['hiss R', 1344, 2],
  ]},
  { title: 'SPECIAL', anims: [
    ['X pose',       1376, 1],
    ['on hind legs', 1664, 4],
  ]},
  { title: 'PAW ATTACK', anims: [
    ['paw down',     1408, 9],
    ['paw up',       1440, 5],
    ['paw left',     1472, 7],
    ['paw right',    1504, 7],
    ['paw right-d',  1536, 9],
    ['paw left-d',   1568, 9],
    ['paw right-up', 1600, 5],
    ['paw left-up',  1632, 5],
  ]},
  { title: 'EAT', anims: [
    ['eat down',     640, 8],
    ['eat up',       672, 8],
    ['eat left',     704, 8],
    ['eat right',    736, 8],
    ['eat right-d',  768, 8],
    ['eat left-d',   800, 8],
    ['eat right-up', 832, 8],
    ['eat left-up',  864, 8],
  ]},
]

let catFile = 'cat-sprite.png'
let fpsMs = 150

// Build DOM
const container = document.getElementById('sections')
const allEntries = [] // { el, sprite, frameEls, frames, srcY }

SECTIONS.forEach(sec => {
  const secEl = document.createElement('div')
  secEl.className = 'section'
  secEl.innerHTML = `<div class="section-title">${sec.title}</div><div class="anims" id="sec-${sec.title.replace(/\s/g,'-')}"></div>`
  container.appendChild(secEl)

  const animsEl = secEl.querySelector('.anims')
  sec.anims.forEach(([name, srcY, frames]) => {
    const wrap = document.createElement('div')
    wrap.className = 'anim'

    // Animated preview (96×96 = 3×)
    const preview = document.createElement('div')
    preview.className = 'anim-preview'
    const badge = document.createElement('div')
    badge.className = 'playing-badge'
    const sprite = document.createElement('div')
    sprite.className = 'sprite'
    sprite.style.backgroundPositionX = '0px'
    sprite.style.backgroundPositionY = `-${srcY * 3}px`
    preview.appendChild(badge)
    preview.appendChild(sprite)

    // Frame strip (48×48 = 2×)
    const strip = document.createElement('div')
    strip.className = 'anim-strip'
    const frameEls = []
    for (let f = 0; f < frames; f++) {
      const fr = document.createElement('div')
      fr.className = 'frame'
      fr.style.backgroundPositionX = `-${f * 32 * 2}px`
      fr.style.backgroundPositionY = `-${srcY * 2}px`
      strip.appendChild(fr)
      frameEls.push(fr)
    }

    const nameEl = document.createElement('div')
    nameEl.className = 'anim-name'
    nameEl.textContent = name

    const coords = document.createElement('div')
    coords.className = 'anim-coords'
    coords.textContent = `y=${srcY} f=${frames}`

    wrap.appendChild(preview)
    wrap.appendChild(strip)
    wrap.appendChild(nameEl)
    wrap.appendChild(coords)
    animsEl.appendChild(wrap)

    const entry = { preview, sprite, frameEls, frames, srcY, frame: 0, timer: null, name }
    allEntries.push(entry)

    preview.addEventListener('click', () => {
      const wasPlaying = preview.classList.contains('playing')
      // Stop all
      allEntries.forEach(e => {
        clearInterval(e.timer); e.timer = null
        e.preview.classList.remove('playing')
      })
      if (wasPlaying) return
      // Play this one
      entry.frame = 0
      preview.classList.add('playing')
      const tick = () => {
        sprite.style.backgroundPositionX = `-${entry.frame * 32 * 3}px`
        frameEls.forEach((el, i) => el.style.outline = i === entry.frame ? '1px solid #10b981' : '1px solid #27272a')
        entry.frame = (entry.frame + 1) % frames
      }
      tick()
      entry.timer = setInterval(tick, fpsMs)
    })
  })
})

// Cat switcher
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    catFile = btn.dataset.cat
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    updateCat()
  })
})

function updateCat() {
  const url = `url('/${catFile}')`
  allEntries.forEach(({ sprite, frameEls }) => {
    sprite.style.backgroundImage = url
    frameEls.forEach(el => el.style.backgroundImage = url)
  })
}

// FPS slider
const fpsSlider = document.getElementById('fps')
const fpsVal = document.getElementById('fps-val')
fpsSlider.addEventListener('input', () => {
  fpsMs = +fpsSlider.value
  fpsVal.textContent = fpsMs + 'ms'
  // Restart any playing animation with new speed
  allEntries.forEach(entry => {
    if (!entry.timer) return
    clearInterval(entry.timer)
    entry.timer = setInterval(() => {
      entry.sprite.style.backgroundPositionX = `-${entry.frame * 32 * 3}px`
      entry.frameEls.forEach((el, i) => el.style.outline = i === entry.frame ? '1px solid #10b981' : '1px solid #27272a')
      entry.frame = (entry.frame + 1) % entry.frames
    }, fpsMs)
  })
})
</script>
</body>
</html>
